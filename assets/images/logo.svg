<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;900&amp;display=swap');
    </style>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#e07b00"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56d4f5"/>
      <stop offset="100%" style="stop-color:#1a8fc0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- No background — fully transparent for web use -->

  <!-- =============================================
       WIREFRAME DINGO — scaled to 80px height
       ============================================= -->
  <g stroke="url(#amberGrad)" stroke-width="1.4" fill="none"
     stroke-linejoin="round" stroke-linecap="round"
     filter="url(#glow)"
     transform="scale(0.47) translate(2, 4)">

    <!-- TAIL -->
    <polygon points="16,104  38,80  52,100"/>
    <!-- BODY -->
    <polygon points="52,100  60,68  100,56  126,64  128,104  52,104"/>
    <!-- Internal body facet -->
    <line x1="52" y1="104" x2="90" y2="72"/>
    <line x1="90" y1="72" x2="128" y2="104"/>
    <line x1="90" y1="72" x2="100" y2="56"/>
    <!-- BACK LEGS -->
    <polygon points="60,104  72,104  70,130  58,128"/>
    <polygon points="78,104  90,104  88,130  76,130"/>
    <!-- FRONT LEGS -->
    <polygon points="100,104  112,104  110,130  98,128"/>
    <polygon points="116,104  128,104  126,130  114,130"/>
    <!-- NECK -->
    <polygon points="126,64  140,60  136,104  128,104"/>
    <!-- HEAD -->
    <polygon points="134,60  150,44  168,54  162,80  136,82"/>
    <!-- EARS -->
    <polygon points="148,50  156,26  164,52"/>
    <polygon points="134,56  138,32  148,50"/>
    <!-- SNOUT -->
    <polygon points="162,58  176,68  162,80"/>
    <!-- NOSE -->
    <polygon points="173,64  177,68  173,72  169,68"/>
  </g>

  <!-- EYE -->
  <g filter="url(#eyeGlow)" transform="scale(0.47) translate(2, 4)">
    <polygon points="140,62  146,56  152,62  146,68" fill="url(#eyeGrad)" stroke="none"/>
  </g>
  <g transform="scale(0.47) translate(2, 4)">
    <polygon points="140,62  146,56  152,62  146,68" fill="url(#eyeGrad)" stroke="none"/>
    <polygon points="141.5,62  146,57.5  149,62  146,65.5" fill="#ffffff" opacity="0.6" stroke="none"/>
  </g>

  <!-- DIVIDER -->
  <line x1="92" y1="10" x2="92" y2="70" stroke="#ffd166" stroke-width="0.7" stroke-opacity="0.3"/>

  <!-- DINGO -->
  <text x="104" y="48"
        font-family="'DM Sans', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="36"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="3">DINGO</text>

  <!-- Amber underline -->
  <rect x="104" y="53" width="154" height="1.2" rx="0.6" fill="url(#amberGrad)" opacity="0.75"/>
  <polygon points="101,53  104,50  107,53  104,56" fill="#ffd166" opacity="0.85"/>
  <polygon points="255,53  258,50  261,53  258,56" fill="#ffd166" opacity="0.85"/>

  <!-- LAB -->
  <text x="108" y="68"
        font-family="'DM Sans', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="9"
        font-weight="700"
        fill="url(#amberGrad)"
        letter-spacing="13"
        opacity="0.9">LAB</text>

</svg>
